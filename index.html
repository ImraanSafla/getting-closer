<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getting Closer. A conversation game for dates, parties and everyone in between</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="theme-color" content="#7c3aed">
<style>
  :root {
    color-scheme: light;
    --ink: #15151c;
    --ink-soft: #6b6b76;
    --ink-faint: #9999a3;
    --line: #ecebf0;
    --pill-dark: #14141b;
    --accent: #7c3aed;
    --heart: #e0507a;
    --radius-md: 18px;
    --shadow-card: 0 20px 60px -20px rgba(20,20,30,0.2);
    --shadow-soft: 0 8px 24px -10px rgba(20,20,30,0.14);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: #f3f1ee;
  }

  .page-bg {
    position: relative;
    min-height: 100vh;
    background:
      radial-gradient(1000px 560px at 8% -5%, rgba(255,32,150,0.55), transparent 60%),
      radial-gradient(1000px 650px at 100% 0%, rgba(38,99,255,0.5), transparent 55%),
      radial-gradient(800px 560px at 50% 112%, rgba(255,150,20,0.55), transparent 60%),
      radial-gradient(800px 560px at -5% 100%, rgba(255,64,90,0.42), transparent 55%),
      radial-gradient(700px 500px at 60% 40%, rgba(255,214,0,0.28), transparent 60%),
      #fdf9f6;
  }

  /* Full-bleed frosted layer, no frame, shares the exact edges of the gradient behind it */
  .shell {
    min-height: 100vh;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(24px) saturate(190%);
    -webkit-backdrop-filter: blur(24px) saturate(190%);
  }

  /* Reading-width wrapper, invisible chrome, just keeps text and cards centred */
  .content {
    max-width: 880px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px 0;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .brand-mark { filter: drop-shadow(0 3px 6px rgba(20,20,30,0.35)); flex-shrink: 0; }

  /* HERO */
  .hero { text-align: center; padding: 38px 24px 8px; }
  .hero h1 {
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin: 0 0 16px;
    font-weight: 700;
    color: var(--pill-dark);
  }
  .hero p {
    color: var(--ink-soft);
    font-size: 15.5px;
    max-width: 480px;
    margin: 0 auto 22px;
    line-height: 1.5;
  }
  .hero-steps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .hero-step {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    backdrop-filter: blur(12px) saturate(160%);
    -webkit-backdrop-filter: blur(12px) saturate(160%);
    padding: 8px 14px; border-radius: 999px;
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
    box-shadow: var(--shadow-soft);
  }
  .hero-step b { color: var(--ink); font-weight: 700; }
  .hero-arrow { color: var(--ink-faint); font-size: 13px; }

  /* MAIN CARD */
  .app-card {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    backdrop-filter: blur(20px) saturate(190%);
    -webkit-backdrop-filter: blur(20px) saturate(190%);
    margin: 18px 16px 16px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.6);
    padding: 26px 26px 28px;
  }

  /* ACCORDION */
  .accordion { margin-bottom: 18px; }
  .accordion-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    backdrop-filter: blur(14px) saturate(160%);
    -webkit-backdrop-filter: blur(14px) saturate(160%);
    border-radius: 16px;
    padding: 13px 16px;
    cursor: pointer;
    box-shadow: 0 4px 14px -8px rgba(20,20,30,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
    transition: background .15s ease;
  }
  .accordion-header:hover { background: rgba(255,255,255,0.7); }
  .accordion-title { font-size: 13.5px; font-weight: 700; color: var(--ink); }
  .accordion-meta {
    font-size: 12.5px;
    color: var(--ink-faint);
    font-weight: 600;
    margin-left: auto;
  }
  .chevron {
    width: 7px; height: 7px;
    border-right: 2px solid var(--ink-soft);
    border-bottom: 2px solid var(--ink-soft);
    transform: rotate(45deg);
    transition: transform .2s ease;
    flex-shrink: 0;
  }
  .accordion-header[aria-expanded="true"] .chevron { transform: rotate(-135deg); }
  .accordion-body {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height .25s ease, opacity .2s ease, margin-top .25s ease;
  }
  .accordion-body.open {
    max-height: 900px;
    opacity: 1;
    margin-top: 14px;
  }

  /* CATEGORY CHIPS */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    padding: 8px 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
    transition: all .12s ease;
    white-space: nowrap;
  }
  .chip:hover { border-color: #cfcdd8; }
  .chip.active {
    background: rgba(124,58,237,0.16);
    border-color: rgba(124,58,237,0.4);
    color: var(--ink);
  }
  .chip.all-chip { font-weight: 700; }
  .chip.all-chip.active {
    background: var(--pill-dark);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }
  .chip.optin.active {
    background: rgba(219,39,119,0.16);
    border-color: rgba(219,39,119,0.45);
    color: var(--ink);
  }

  /* INTENSITY */
  .intensity-row {
    display: flex;
    gap: 8px;
  }
  .intensity-chip {
    flex: 1;
    text-align: center;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    font-size: 13px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
    transition: all .12s ease;
  }
  .intensity-chip:hover { border-color: #cfcdd8; }
  .intensity-chip.active {
    background: rgba(124,58,237,0.16);
    border-color: rgba(124,58,237,0.4);
    color: var(--ink);
  }

  /* SPINNER */
  .topic-card-inner { display: contents; }
  .spinner-zone {
    text-align: center;
    padding: 16px 10px 4px;
    border-top: 1px dashed var(--line);
  }
  .topic-card {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(245,243,251,0.4));
    border: 1px solid rgba(20,20,30,0.16);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border-radius: 22px;
    padding: 48px 30px;
    margin-bottom: 18px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
    transition: transform .12s ease;
  }
  .topic-card.spinning { animation: shake .08s linear infinite; }
  @keyframes shake {
    0% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
    100% { transform: translateY(0); }
  }
  .topic-cat-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700;
    color: var(--accent);
    background: rgba(124,58,237,0.12);
    border: 1px solid rgba(124,58,237,0.22);
    padding: 5px 12px;
    border-radius: 999px;
  }
  .topic-text {
    font-size: 38px;
    font-weight: 850;
    letter-spacing: -0.025em;
    line-height: 1.15;
    max-width: 600px;
    color: var(--ink);
  }
  .topic-text.long { font-size: 24px; line-height: 1.3; }
  .topic-placeholder { color: var(--ink-faint); font-weight: 600; font-size: 18px; }
  .topic-meta {
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .draw-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .draw-btn {
    flex: 1;
    background: linear-gradient(180deg, rgba(48,48,58,0.92), rgba(14,14,19,0.94));
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    padding: 17px 28px;
    border-radius: 999px;
    font-size: 15.5px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 14px 28px -12px rgba(20,20,27,0.55), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform .1s ease, box-shadow .15s ease;
  }
  .draw-btn:hover { transform: translateY(-1px); box-shadow: 0 18px 32px -12px rgba(20,20,27,0.6), inset 0 1px 0 rgba(255,255,255,0.3); }
  .draw-btn:active { transform: scale(0.97); }
  .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .empty-hint {
    font-size: 12.5px;
    color: var(--ink-faint);
    font-weight: 600;
    margin-bottom: 10px;
    display: none;
  }
  .empty-hint.visible { display: block; }

  /* FAVOURITE BUTTON */
  .fav-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(20,20,30,0.14);
    background: rgba(255,255,255,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--ink-faint);
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    transition: all .15s ease;
  }
  .fav-btn.shown { display: flex; }
  .fav-btn.active { border-color: rgba(224,80,122,0.4); background: rgba(224,80,122,0.12); }
  .fav-icon { fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linejoin: round; transition: fill .15s ease, stroke .15s ease; }
  .fav-btn.active .fav-icon { fill: var(--heart); stroke: var(--heart); stroke-width: 1.4; }
  .fav-btn.pulse { animation: heartbeat .55s ease; }
  @keyframes heartbeat {
    0% { transform: scale(1); }
    22% { transform: scale(1.38); }
    40% { transform: scale(1); }
    58% { transform: scale(1.22); }
    75% { transform: scale(1); }
    100% { transform: scale(1); }
  }

  /* FAVOURITES LIST */
  .fav-list { display: flex; flex-direction: column; gap: 8px; }
  .fav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 14px;
    padding: 10px 12px;
  }
  .fav-item-main { flex: 1; cursor: pointer; }
  .fav-item-cat { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
  .fav-item-text { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .fav-remove {
    border: none;
    background: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 17px;
    line-height: 1;
    padding: 4px 6px;
  }
  .fav-remove:hover { color: var(--heart); }
  .fav-empty { font-size: 13px; color: var(--ink-faint); padding: 6px 2px; }

  /* WHAT AM I? REVEAL */
  .reveal-instruction {
    font-size: 13px;
    color: var(--ink-soft);
    max-width: 440px;
    line-height: 1.45;
    margin-bottom: 4px;
  }
  .reveal-word {
    font-size: 38px;
    font-weight: 850;
    letter-spacing: -0.025em;
    color: var(--ink);
    filter: blur(16px);
    user-select: none;
    transition: filter .12s ease;
  }
  .reveal-word.shown { filter: blur(0); }
  .reveal-btn {
    background: linear-gradient(180deg, rgba(48,48,58,0.92), rgba(14,14,19,0.94));
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px 26px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 10px 20px -10px rgba(20,20,27,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
  }

  @media (max-width: 620px) {
    .hero h1 { font-size: 42px; }
    .topic-text { font-size: 27px; }
    .topic-text.long { font-size: 19px; }
    .reveal-word { font-size: 27px; }
  }
</style>
</head>
<body>
<div class="page-bg">
  <div class="shell">
    <div class="content">

    <div class="nav">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 48 48" width="30" height="30" aria-hidden="true">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M18.5 6C10.4919 6 4 12.4919 4 20.5C4 38.5 28 42 28 42V35H29.5C37.5081 35 44 28.5081 44 20.5C44 12.4919 37.5081 6 29.5 6H18.5ZM24 23.5C25.3807 23.5 26.5 22.3807 26.5 21C26.5 19.6193 25.3807 18.5 24 18.5C22.6193 18.5 21.5 19.6193 21.5 21C21.5 22.3807 22.6193 23.5 24 23.5ZM34.5 21C34.5 22.3807 33.3807 23.5 32 23.5C30.6193 23.5 29.5 22.3807 29.5 21C29.5 19.6193 30.6193 18.5 32 18.5C33.3807 18.5 34.5 19.6193 34.5 21ZM16 23.5C17.3807 23.5 18.5 22.3807 18.5 21C18.5 19.6193 17.3807 18.5 16 18.5C14.6193 18.5 13.5 19.6193 13.5 21C13.5 22.3807 14.6193 23.5 16 23.5Z" fill="#14141b"/>
        </svg>
        GC
      </div>
    </div>

    <div class="hero">
      <h1>Getting Closer</h1>
      <p>Built for friends, relationships or a full room at a party.</p>
      <div class="hero-steps">
        <div class="hero-step"><b>01</b>&nbsp;Pick a mood</div>
        <div class="hero-arrow">→</div>
        <div class="hero-step"><b>02</b>&nbsp;Draw a topic</div>
        <div class="hero-arrow">→</div>
        <div class="hero-step"><b>03</b>&nbsp;Talk it through</div>
      </div>
    </div>

    <div class="app-card">

      <div class="accordion">
        <button class="accordion-header" id="categoryToggle" aria-expanded="false">
          <span class="accordion-title">Categories</span>
          <span class="accordion-meta" id="categoryMeta">All selected</span>
          <span class="chevron"></span>
        </button>
        <div class="accordion-body" id="categoryBody">
          <div class="chips" id="chipRow"></div>
        </div>
      </div>

      <div class="accordion">
        <button class="accordion-header" id="intensityToggle" aria-expanded="false">
          <span class="accordion-title">Intensity</span>
          <span class="accordion-meta" id="intensityMeta">Mix selected</span>
          <span class="chevron"></span>
        </button>
        <div class="accordion-body" id="intensityBody">
          <div class="intensity-row" id="intensityRow"></div>
        </div>
      </div>

      <div class="spinner-zone">
        <div class="empty-hint" id="emptyHint">Try widening your categories.</div>
        <div class="draw-row">
          <button class="draw-btn" id="drawBtn">Draw a topic</button>
        </div>

        <div class="topic-card" id="topicCard">
          <button class="fav-btn" id="favBtn" aria-label="Save to favourites" type="button">
            <svg class="fav-icon" viewBox="0 0 24 24" width="19" height="19" aria-hidden="true">
              <path d="M12 21s-6.87-4.35-9.53-8.35C.86 10.1 1.5 6.6 4.4 4.9c2.35-1.38 5.1-.7 6.7 1.3l.9 1.12.9-1.12c1.6-2 4.35-2.68 6.7-1.3 2.9 1.7 3.54 5.2 1.93 7.75C18.87 16.65 12 21 12 21z"/>
            </svg>
          </button>
          <div class="topic-card-inner" id="topicCardInner">
            <div class="topic-placeholder" id="topicPlaceholder">Press the button to draw your first topic</div>
          </div>
        </div>
      </div>

      <div class="accordion">
        <button class="accordion-header" id="favToggle" aria-expanded="false">
          <span class="accordion-title">Favourites</span>
          <span class="accordion-meta" id="favMeta">0 saved</span>
          <span class="chevron"></span>
        </button>
        <div class="accordion-body" id="favBody">
          <div class="fav-list" id="favList"></div>
        </div>
      </div>

    </div>
   </div>
  </div>
</div>

<script>

  // Hard only: the classic "dun, dun, DUNNN" suspense sting. Easy and Mix are silent.
  function playIntensitySound() {
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      var ctx = new Ctx();
      var now = ctx.currentTime;
      function dun(time, freq, dur, vol) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(time);
        osc.stop(time + dur + 0.02);
      }
      dun(now, 110, 0.15, 0.06);
      dun(now + 0.24, 110, 0.15, 0.06);
      dun(now + 0.5, 92, 0.85, 0.075);
    } catch (e) {}
  }

  // ---------- POOL / PICK LOGIC ----------
  function poolForCategory(catId) {
    var pool = ALL_TOPICS.filter(function (t) { return t.categoryId === catId; });
    var cat = CATEGORY_BY_ID[catId];
    if (cat && cat.noIntensity) return pool;
    if (currentIntensity === "mix") return pool;
    var want = currentIntensity === "easy" ? "e" : "h";
    return pool.filter(function (t) { return t.intensity === want; });
  }

  function getBuckets() {
    var buckets = selectedDefault.concat(selectedOptin);
    if (isAllActive()) buckets.push("general");
    return buckets.filter(function (id) { return poolForCategory(id).length > 0; });

  function pickTopic() {
    var buckets = getBuckets();
    if (!buckets.length) return null;
    var catId = buckets[Math.floor(Math.random() * buckets.length)];
    var pool = poolForCategory(catId);
    return pool[Math.floor(Math.random() * pool.length)];
  }

  // Roller-deck flip tick, a short mechanical click rather than a slot-machine ding.
  // isFinal gives the settling flip a slightly lower, longer tone.
  function playFlipTick(isFinal) {
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      var ctx = new Ctx();
      var now = ctx.currentTime;
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "triangle";
      var base = isFinal ? 150 : (170 + Math.random() * 40);
      var dur = isFinal ? 0.1 : 0.05;
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(base * 0.75, now + dur);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(isFinal ? 0.14 : 0.08, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.02);
    } catch (e) {}
  }

  function draw() {
    if (getBuckets().length === 0) return;
    drawBtn.disabled = true;
    topicCard.classList.add("spinning");
    favBtn.classList.remove("shown");

    var ticks = 0;
    var maxTicks = 9;
    var interval = setInterval(function () {
      var t = pickTopic();
      if (t) renderTopicCard(t, true);
      ticks++;
      playFlipTick(false);
      if (ticks >= maxTicks) {
        clearInterval(interval);
        var final = pickTopic();
        currentTopic = final;
        if (final) {
          state.spins[final.id] = (state.spins[final.id] || 0) + 1;
          saveState();
          renderTopicCard(final, false);
          playFlipTick(true);
        }
        topicCard.classList.remove("spinning");
        drawBtn.disabled = false;
        updateFavButton();
      }
    }, 65);
  }

  drawBtn.addEventListener("click", draw);

  // Short, soft "lub-dub" heartbeat, synthesised so no audio file is needed.
  function playHeartbeat() {
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      var ctx = new Ctx();
      function thump(time, freq, dur, vol) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, time);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, time + dur);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(vol, time + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(time);
        osc.stop(time + dur + 0.02);
      }
      var now = ctx.currentTime;
      thump(now, 95, 0.12, 0.2);
      thump(now + 0.16, 80, 0.14, 0.14);
    } catch (e) {}
  }

  // ---------- FAVOURITES ----------
  var favMeta = document.getElementById("favMeta");
  var favList = document.getElementById("favList");

  function renderFavourites() {
    favMeta.textContent = state.favourites.length + " saved";
    favList.innerHTML = "";
    if (!state.favourites.length) {
      var empty = document.createElement("div");
      empty.className = "fav-empty";
      empty.textContent = "Nothing saved yet. Tap the heart on a topic to keep it here.";
      favList.appendChild(empty);
      return;
    }
    state.favourites.forEach(function (id) {
      var t = ALL_TOPICS_BY_ID[id];
      if (!t) return;
      var item = document.createElement("div");
      item.className = "fav-item";

      var main = document.createElement("div");
      main.className = "fav-item-main";
      main.innerHTML = '<div class="fav-item-cat">' + t.categoryName + '</div><div class="fav-item-text">' + escapeHtml(t.text) + "</div>";
      main.addEventListener("click", function () {
        currentTopic = t;
        renderTopicCard(t, false);
        updateFavButton();
      });

      var remove = document.createElement("button");
      remove.className = "fav-remove";
      remove.setAttribute("aria-label", "Remove from favourites");
      remove.textContent = "✕";
      remove.addEventListener("click", function () {
        state.favourites = state.favourites.filter(function (fid) { return fid !== id; });
        saveState();
        renderFavourites();
        updateFavButton();
      });

      item.appendChild(main);
      item.appendChild(remove);
      favList.appendChild(item);
    });
  }

  // ---------- INIT ----------
  renderChips();
  renderIntensity();
  renderFavourites();
  updateAvailability();
})();
</script>
</body>
</html>
